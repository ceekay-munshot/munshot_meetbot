name: Release Helm chart

# Publishes deploy/helm/charts/vexa to gh-pages as a Helm repo whenever
# Chart.yaml.version changes on main. Consumers: `helm repo add vexa
# https://vexa-ai.github.io/vexa && helm repo update`. Closes #228.

on:
  push:
    branches:
      - main
    paths:
      - 'deploy/helm/charts/**'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.0

      # chart-releaser-action inspects Chart.yaml in every charts_dir
      # subdir; if the version is new (not yet tagged chart-<name>-<version>),
      # it packages the chart, pushes the .tgz to `gh-pages`, refreshes
      # `index.yaml`, and drafts a matching GitHub Release. Same commit
      # with no version bump is a no-op.
      #
      # 2026-05-01: skip_existing added because patch releases that bump
      # Chart.yaml.appVersion only (not version) re-package the same
      # vexa-X.Y.Z.tgz and the action otherwise fails with
      # "422 tag_name already_exists" when the GH release already exists.
      # mark_as_latest is the helper for not flapping :latest pointer
      # across appVersion-only bumps.
      - name: Release chart
        uses: helm/chart-releaser-action@a917fd15b20e8b64b94d9158ad54cd6345335584 # v1.6.0
        with:
          charts_dir: deploy/helm/charts
          skip_existing: true
          mark_as_latest: false
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
