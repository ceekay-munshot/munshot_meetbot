name: vexa
services:
  # --- Infrastructure ---

  redis:
    image: redis:7.0-alpine
    mem_limit: 512m
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - vexa
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    # idle_in_transaction_session_timeout=60s auto-kills orphaned transactions
    # (defense-in-depth against future DB session leaks in meeting-api).
    command: ["postgres", "-c", "idle_in_transaction_session_timeout=60000"]
    environment:
      - POSTGRES_DB=${DB_NAME:-vexa}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5458}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vexa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vexa
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    mem_limit: 1g
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    ports:
      # v0.10.5.3 Pack D-3 follow-up (Option B):
      # MINIO_HOST_BIND defaults to 127.0.0.1 (safe — only the host can reach
      # MinIO; presigned URLs only work for browsers running on the host).
      # For external-browser audio playback (e.g. dashboard accessed from a
      # remote machine), set MINIO_HOST_BIND=0.0.0.0 + set MINIO_PUBLIC_ENDPOINT
      # to e.g. http://<host-public-ip>:${MINIO_HOST_PORT}. The presigned URL
      # signature uses MINIO_PUBLIC_ENDPOINT; without that env, presigned URLs
      # carry the in-network hostname `minio:9000` which only resolves inside
      # the docker bridge network.
      - "${MINIO_HOST_BIND:-127.0.0.1}:${MINIO_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - vexa
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5
        mc alias set vexa http://minio:9000 $${MINIO_ROOT_USER:-vexa-access-key} $${MINIO_ROOT_PASSWORD:-vexa-secret-key}
        mc mb --ignore-existing vexa/${MINIO_BUCKET:-vexa}
        exit 0
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    networks:
      - vexa

  # --- Core services ---

  admin-api:
    build:
      context: ../..
      dockerfile: services/admin-api/Dockerfile
    image: vexaai/admin-api:${IMAGE_TAG}
    ports:
      - "127.0.0.1:${ADMIN_API_PORT:-8057}:8001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - ADMIN_API_TOKEN=${ADMIN_TOKEN:-changeme}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      # Per-user concurrent-bot limit assigned to a NEW user at signup. Prevents
      # a fresh account from being created with an unlimited (0) cap.
      - DEFAULT_MAX_CONCURRENT_BOTS=${DEFAULT_MAX_CONCURRENT_BOTS:-2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vexa
    restart: unless-stopped

  runtime-api:
    build:
      context: ../../services/runtime-api
      dockerfile: Dockerfile
    image: vexaai/runtime-api:${IMAGE_TAG}
    group_add:
      - "${DOCKER_GID:-998}"
    ports:
      - "127.0.0.1:${RUNTIME_API_PORT:-8090}:8090"
    environment:
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-vexa}_vexa
      - AGENT_IMAGE=${AGENT_IMAGE}
      - BROWSER_IMAGE=${BROWSER_IMAGE}
      - REDIS_URL=redis://redis:6379
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL:-}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa}
      - CLAUDE_CREDENTIALS_PATH=${CLAUDE_CREDENTIALS_PATH}
      - CLAUDE_JSON_PATH=${CLAUDE_JSON_PATH}
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - API_KEYS=${BOT_API_TOKEN:-}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - PROFILES_PATH=/app/profiles.yaml
      - ALLOW_PRIVATE_CALLBACKS=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../services/runtime-api/profiles.yaml:/app/profiles.yaml:ro
    init: true
    depends_on:
      - redis
      - postgres
    networks:
      - vexa
    restart: unless-stopped

  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    image: vexaai/api-gateway:${IMAGE_TAG}
    mem_limit: 1g
    ports:
      - "${API_GATEWAY_HOST_PORT:-8056}:8000"
      - "8080:8000"        # extra fixed port for Cloudflare-Worker reachability (Workers block 8056)
    environment:
      - ADMIN_API_URL=http://admin-api:8001
      - MEETING_API_URL=http://meeting-api:8080
      - TRANSCRIPTION_COLLECTOR_URL=http://meeting-api:8080
      - CALENDAR_SERVICE_URL=http://calendar-service:8050
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      # System key for the unauthenticated /public/google-meet endpoint (set by `make setup-api-key`).
      - PUBLIC_BOT_API_KEY=${VEXA_API_KEY:-}
      # Admin token — lets /public/join find-or-create a per-client user by email
      # (the Cloudflare BFF "email + meeting link → bot joins" front door).
      - ADMIN_API_TOKEN=${ADMIN_TOKEN:-changeme}
      - DEFAULT_BOT_NAME=${DEFAULT_BOT_NAME:-munshot meetbot}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-120}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    depends_on:
      admin-api:
        condition: service_healthy
      meeting-api:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - vexa
    restart: unless-stopped

  meeting-api:
    build:
      context: ../..
      dockerfile: services/meeting-api/Dockerfile
    image: vexaai/meeting-api:${IMAGE_TAG}
    mem_limit: 1g
    expose:
      - "8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ADMIN_TOKEN=${ADMIN_API_TOKEN:-changeme}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      # Global concurrency cap across ALL users — protects a fixed-capacity host.
      # 0 = disabled (default). Set to the host's bot capacity (e.g. 7) in prod.
      - GLOBAL_MAX_CONCURRENT_BOTS=${GLOBAL_MAX_CONCURRENT_BOTS:-0}
      - RUNTIME_API_URL=http://runtime-api:8090
      - RUNTIME_API_TOKEN=${BOT_API_TOKEN:-}
      - MEETING_API_URL=http://meeting-api:8080
      - BOT_IMAGE_NAME=${BROWSER_IMAGE}
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-vexa}_vexa
      # agent-api is not shipped in this compose profile. Operators can opt in
      # with POST_MEETING_HOOKS, but the default must not point at a disabled
      # service or every completed meeting emits DNS errors before handoff.
      - POST_MEETING_HOOKS=${POST_MEETING_HOOKS:-}
      - TRANSCRIPTION_COLLECTOR_URL=http://meeting-api:8080
      - STORAGE_BACKEND=${STORAGE_BACKEND:-minio}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      # v0.10.5.3 Pack D-3 follow-up (Option B): browser-reachable MinIO
      # endpoint for presigned download URLs. Default falls back to the
      # internal hostname which works for in-network browsers (compose VM
      # reachable on its own LAN). For external browser access set this
      # to e.g. http://${HOST_PUBLIC_IP}:9000 in .env. storage.py uses
      # this only when signing URLs; server-side I/O still uses
      # MINIO_ENDPOINT for fast in-cluster reads.
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-}
      # Shared notetaker session path (S3/MinIO). When set, EVERY meeting bot
      # joins signed-in as the one seeded notetaker Google account → no-knock
      # admission. Seed it once via a browser_session login (see README), then
      # point this at that session's path, e.g. users/<notetaker_user_id>/browser-userdata.
      - NOTETAKER_S3_PATH=${NOTETAKER_S3_PATH:-}
      - RECORDING_ENABLED=${RECORDING_ENABLED:-true}
      - CAPTURE_MODES=${CAPTURE_MODES:-audio}
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL:-}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      - TRANSCRIPTION_GATEWAY_URL=${TRANSCRIPTION_GATEWAY_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Default bot display name when a request omits bot_name
      - DEFAULT_BOT_NAME=${DEFAULT_BOT_NAME:-munshot meetbot}
      # Cloudflare D1 transcript mirror (best-effort; off unless ENABLED=true)
      - CLOUDFLARE_D1_ENABLED=${CLOUDFLARE_D1_ENABLED:-false}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID:-}
      - CF_D1_DATABASE_ID=${CF_D1_DATABASE_ID:-}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - CF_D1_TABLE=${CF_D1_TABLE:-transcriptions}
    volumes:
      - ${LOCAL_STORAGE_VOLUME_SOURCE:-recordings-data}:/data/recordings
    init: true
    depends_on:
      - redis
      - postgres
      - runtime-api
    networks:
      - vexa
    restart: unless-stopped

  # --- Optional services ---

  # Calendar auto-join: polls each connected user's Google Calendar, finds Meet
  # links, and dispatches a bot ~lead-time before each meeting — owned by that
  # user (per-user isolation). Enable by setting GOOGLE_CLIENT_ID/SECRET and
  # connecting a user's calendar (stores a refresh token in users.data).
  calendar-service:
    build:
      context: ../..
      dockerfile: services/calendar-service/Dockerfile
    image: vexaai/calendar-service:${IMAGE_TAG}
    mem_limit: 512m
    ports:
      - "127.0.0.1:${CALENDAR_SERVICE_PORT:-8050}:8050"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - MEETING_API_URL=http://meeting-api:8080
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - CALENDAR_FRONTEND_URL=${CALENDAR_FRONTEND_URL:-}
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      # System key the Cloudflare BFF uses to POST /calendar/oauth (store token).
      - PUBLIC_BOT_API_KEY=${VEXA_API_KEY:-}
      - CALENDAR_ALLOW_INSECURE_OAUTH=${CALENDAR_ALLOW_INSECURE_OAUTH:-false}
      - DEFAULT_BOT_NAME=${DEFAULT_BOT_NAME:-munshot meetbot}
      - SYNC_INTERVAL_SECONDS=${CALENDAR_SYNC_INTERVAL_SECONDS:-300}
      - DEFAULT_LEAD_TIME_MINUTES=${CALENDAR_LEAD_TIME_MINUTES:-2}
      - CALENDAR_SYNC_WINDOW_DAYS=${CALENDAR_SYNC_WINDOW_DAYS:-30}
      # Cloudflare D1 creds: calendar-service mirrors the multi-owner list
      # (mirror_meeting_owners_to_d1) so every calendar attendee can see the
      # meeting on the frontend. Without these the owners sink silently skips
      # (_is_configured() → False) and the D1 meeting_owners table stays empty.
      - CLOUDFLARE_D1_ENABLED=${CLOUDFLARE_D1_ENABLED:-false}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID:-}
      - CF_D1_DATABASE_ID=${CF_D1_DATABASE_ID:-}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - CF_D1_SCHEDULES_TABLE=${CF_D1_SCHEDULES_TABLE:-schedules}
      - CF_D1_CALENDAR_EVENTS_TABLE=${CF_D1_CALENDAR_EVENTS_TABLE:-calendar_events}
      # Scheduler loop: polls D1 `schedules` (Worker-owned) ~once a minute and
      # dispatches due rows to the real bot-launch endpoint on api-gateway.
      - SCHEDULE_POLL_INTERVAL_SECONDS=${SCHEDULE_POLL_INTERVAL_SECONDS:-60}
      - SCHEDULER_API_BASE_URL=${SCHEDULER_API_BASE_URL:-http://65.1.101.15.nip.io:8080}
      - SCHEDULER_MAX_ATTEMPTS=${SCHEDULER_MAX_ATTEMPTS:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    init: true
    depends_on:
      - postgres
      - meeting-api
    networks:
      - vexa
    restart: unless-stopped

  dashboard:
    build:
      context: ../..
      dockerfile: services/dashboard/Dockerfile
      # Release identity guard: the dashboard Dockerfile copies VERSION and
      # Chart.yaml into the build and rejects a stale VEXA_VERSION override.
      # Empty VEXA_VERSION is allowed; the generator then uses VERSION.
      args:
        NEXT_PUBLIC_VEXA_OSS_VERSION: ${VEXA_VERSION:-}
        NEXT_PUBLIC_VEXA_OSS_RELEASE_DATE: ${VEXA_RELEASE_DATE:-}
        VEXA_API_URL: http://api-gateway:8000
    image: vexaai/dashboard:${IMAGE_TAG}
    mem_limit: 1g
    ports:
      - "${DASHBOARD_HOST_PORT:-3001}:3000"
    environment:
      - VEXA_API_URL=http://api-gateway:8000
      - VEXA_PUBLIC_API_URL=${VEXA_PUBLIC_API_URL:-}
      - API_GATEWAY_HOST_PORT=${API_GATEWAY_HOST_PORT:-8056}
      - VEXA_API_KEY=${VEXA_API_KEY:-}
      - VEXA_ADMIN_API_KEY=${ADMIN_API_TOKEN:-changeme}
      - VEXA_ADMIN_API_URL=http://admin-api:8001
      - JWT_SECRET=${JWT_SECRET:-vexa-dev-jwt-secret}
      - VEXA_AUTH_COOKIE_NAME=${VEXA_AUTH_COOKIE_NAME:-vexa-token-compose}
      - VEXA_USER_INFO_COOKIE_NAME=${VEXA_USER_INFO_COOKIE_NAME:-vexa-user-info-compose}
      - VEXA_ALLOW_DIRECT_LOGIN=${VEXA_ALLOW_DIRECT_LOGIN:-true}
      # Multi-user mode: when true, every data request requires a logged-in
      # user's own token — no shared VEXA_API_KEY fallback (enforces per-user
      # transcript isolation). Leave false for local/dev single-tenant use.
      - VEXA_REQUIRE_AUTH=${VEXA_REQUIRE_AUTH:-false}
      # Google OAuth SSO (NextAuth). Set all to enable "Sign in with Google".
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - MINIO_INTERNAL_ENDPOINT=${MINIO_INTERNAL_ENDPOINT:-http://minio:9000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-}
      - DEFAULT_BOT_NAME=${DEFAULT_BOT_NAME:-munshot meetbot}
    init: true
    depends_on:
      - api-gateway
    networks:
      - vexa
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  minio-data:
  recordings-data:

networks:
  vexa:
    driver: bridge
